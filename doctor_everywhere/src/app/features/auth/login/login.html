<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-header">
      <div>
        <img src="logo-trans.png" alt="DoctorEverywhere" height="180" style="object-fit: contain" />
      </div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your DoctorEverywhere account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate class="auth-form">

      <!-- Error banner -->
      <div class="error-banner" *ngIf="errorMessage" role="alert">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5"/>
          <path d="M8 5v3.5M8 11h.01" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        {{ errorMessage }}
      </div>

      <!-- Username -->
      <div class="form-group" [class.has-error]="username.invalid && username.touched">
        <label class="form-label" for="username">Username</label>
        <input
          id="username"
          type="text"
          class="form-input"
          formControlName="username"
          placeholder="your_username"
          autocomplete="username"
        />
        <span class="form-error" *ngIf="username.touched && username.errors?.['required']">
          Username is required.
        </span>
        <span class="form-error" *ngIf="username.touched && username.errors?.['minlength']">
          Username must be at least 3 characters.
        </span>
        <span class="form-error" *ngIf="username.touched && username.errors?.['noSpaces']">
          Username cannot contain spaces.
        </span>
      </div>

      <!-- Password -->
      <div class="form-group" [class.has-error]="password.invalid && password.touched">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrapper">
          <input
            id="password"
            [type]="showPassword ? 'text' : 'password'"
            class="form-input has-suffix"
            formControlName="password"
            placeholder="••••••••"
            autocomplete="current-password"
          />
          <button type="button" class="input-suffix-btn" (click)="togglePassword()"
                  [title]="showPassword ? 'Hide password' : 'Show password'">
            <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 12s3.636-7 10-7 10 7 10 7-3.636 7-10 7S2 12 2 12z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="form-error" *ngIf="password.touched && password.errors?.['required']">
          Password is required.
        </span>
        <span class="form-error" *ngIf="password.touched && password.errors?.['minlength']">
          Password must be at least 8 characters.
        </span>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">Sign in</span>
        <span *ngIf="loading" class="btn-loading">
          <span class="spinner"></span>
          Signing in…
        </span>
      </button>

    </form>

    <p class="auth-footer">Don't have an account? <a routerLink="/auth/register">Create one</a></p>
  </div>
</div>
