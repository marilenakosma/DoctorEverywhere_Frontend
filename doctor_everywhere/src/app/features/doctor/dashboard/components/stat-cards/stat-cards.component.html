<div class="row g-3">
  <div class="col-md-4">
    <div class="card border h-100">
      <div class="card-body d-flex align-items-center gap-3">
        <div
          class="stat-icon bg-primary-subtle rounded-3 d-flex align-items-center justify-content-center flex-shrink-0"
        >
          <i class="bi bi-calendar-check text-primary fs-5"></i>
        </div>
        <div>
          <div class="h4 fw-bold mb-0">{{ todayCount }}</div>
          <div class="text-muted small">Today's Appointments</div>
        </div>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card border h-100">
      <div class="card-body d-flex align-items-center gap-3">
        <div
          class="stat-icon bg-warning-subtle rounded-3 d-flex align-items-center justify-content-center flex-shrink-0"
        >
          <i class="bi bi-hourglass-split text-warning fs-5"></i>
        </div>
        <div>
          <div class="h4 fw-bold mb-0">{{ pendingCount }}</div>
          <div class="text-muted small">Pending Requests</div>
        </div>
      </div>
    </div>
  </div>

        <div class="stat-icon bg-danger-subtle rounded-3 d-flex align-items-center justify-content-center flex-shrink-0">
          <i class="bi bi-chat-dots text-danger fs-5"></i>
        </div>
        <div>
          <div class="h4 fw-bold mb-0">{{ unreadCount }}</div>

        </div>
      </div>
    </div>
  </div> -->
</div>
