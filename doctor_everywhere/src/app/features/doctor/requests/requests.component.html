<div class="d-flex flex-column gap-4">

  <div>
    <h1 class="h4 fw-semibold text-dark mb-0">Appointment Requests</h1>
    <p class="text-muted small mb-0">Review and respond to patient booking requests.</p>
  </div>

  <ul class="nav appt-tabs">
    <li class="nav-item">
      <button class="appt-tab d-flex align-items-center gap-2" [class.active]="activeTab === 'pending'" (click)="activeTab = 'pending'">
        <span class="tab-dot dot-pending"></span>
        Pending
        <span class="tab-badge badge-pending">{{ pending.length }}</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="appt-tab d-flex align-items-center gap-2" [class.active]="activeTab === 'accepted'" (click)="activeTab = 'accepted'">
        <span class="tab-dot dot-accepted"></span>
        Accepted
        <span class="tab-badge badge-accepted">{{ accepted.length }}</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="appt-tab d-flex align-items-center gap-2" [class.active]="activeTab === 'rejected'" (click)="activeTab = 'rejected'">
        <span class="tab-dot dot-rejected"></span>
        Rejected
        <span class="tab-badge badge-rejected">{{ rejected.length }}</span>
      </button>
    </li>
  </ul>

  <app-request-list
    [requests]="activeList"
    [loading]="loading"
    [showActions]="activeTab === 'pending'"
    (accepted)="accept($event)"
    (rejected)="reject($event)"
  />

</div>
