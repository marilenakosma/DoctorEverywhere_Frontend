<div class="d-flex flex-column gap-4">

  <div>
    <h1 class="h4 fw-semibold text-dark mb-0">Appointments</h1>
  </div>

  <!-- Tabs -->
  <ul class="nav appt-tabs">
    <li class="nav-item">
      <button class="appt-tab d-flex align-items-center gap-2" [class.active]="activeTab === 'upcoming'" (click)="activeTab = 'upcoming'">
        <span class="tab-dot dot-upcoming"></span>
        Upcoming
        <span class="tab-badge badge-upcoming">{{ upcoming.length }}</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="appt-tab d-flex align-items-center gap-2" [class.active]="activeTab === 'past'" (click)="activeTab = 'past'">
        <span class="tab-dot dot-past"></span>
        Past
        <span class="tab-badge badge-past">{{ past.length }}</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="appt-tab d-flex align-items-center gap-2" [class.active]="activeTab === 'cancelled'" (click)="activeTab = 'cancelled'">
        <span class="tab-dot dot-cancelled"></span>
        Cancelled
        <span class="tab-badge badge-cancelled">{{ cancelled.length }}</span>
      </button>
    </li>
    <li class="nav-item">
      <button class="appt-tab d-flex align-items-center gap-2" [class.active]="activeTab === 'slots'" (click)="activeTab = 'slots'">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/>
        </svg>
        Weekly Slots
      </button>
    </li>
  </ul>

  @if (activeTab !== 'slots') {
    <app-appointment-list [appointments]="activeList" [loading]="loading" [label]="activeTab" />
  }

  @if (activeTab === 'slots') {
    <app-weekly-schedule />
  }

</div>
